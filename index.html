<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PizzaMate Chatbot</title>

<style>
    /* Reset */
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
    }

    /* Background */
    body {
        height: 100vh;
        background: linear-gradient(135deg, #ff9a9e, #fad0c4);
        display: flex;
        justify-content: center;
        align-items: center;
    }

    /* Main Container */
    .container {
        text-align: center;
        background: white;
        padding: 40px;
        border-radius: 20px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        width: 90%;
        max-width: 500px;
    }

    /* Heading */
    h1 {
        color: #ff4b2b;
        margin-bottom: 10px;
    }

    /* Subtext */
    p {
        color: #555;
        margin-bottom: 20px;
    }

    /* Button */
    .btn {
        background: #ff4b2b;
        color: white;
        border: none;
        padding: 12px 20px;
        border-radius: 25px;
        cursor: pointer;
        font-size: 16px;
        transition: 0.3s;
    }

    .btn:hover {
        background: #ff6a4d;
        transform: scale(1.05);
    }

    /* Footer */
    .footer {
        margin-top: 20px;
        font-size: 14px;
        color: #888;
    }
</style>

</head>
<body>

<div class="container">
    <h1>🍕 PizzaMate</h1>
    <p>Your smart pizza ordering assistant</p>
    <button class="btn" onclick="alert('Click the chat icon below to start!')">
        Start Chat
    </button>

    <div class="footer">
        Powered by Watson Assistant
    </div>
</div>

<!-- Watson Assistant Chatbot Script -->
<script>
  window.watsonAssistantChatOptions = {
    integrationID: "8296ea67-38a7-4f24-8707-fe0fc5606bc0",
    region: "eu-de",
    serviceInstanceID: "a8558f11-28ef-4113-82bf-ddaf0d66989f",
    onLoad: async (instance) => { await instance.render(); }
  };

  setTimeout(function(){
    const t = document.createElement('script');
    t.src = "https://web-chat.global.assistant.watson.appdomain.cloud/versions/" +
            (window.watsonAssistantChatOptions.clientVersion || 'latest') +
            "/WatsonAssistantChatEntry.js";
    document.head.appendChild(t);
  });
</script>

</body>
</html>
